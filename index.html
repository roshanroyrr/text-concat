<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Concat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1>Text Concatenator</h1>
      <p class="subtitle">Split words and join them with any character</p>
      <div class="container">
        <div class="left">
          <label for="text-input">Enter your text</label>
          <textarea id="text-input" class="input-field" placeholder="e.g. apple banana cherry"></textarea>
          <label for="delimiter-input">Delimiter</label>
          <input type="text" id="delimiter-input" class="input-field" placeholder="e.g. , or -" />
        </div>
        <div class="right">
          <span class="label">Result</span>
          <div id="output-box"></div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
